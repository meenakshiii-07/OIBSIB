<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>To-Do List Web App</title>
  <link rel="stylesheet" href="style.css" />
</head>
<body>
  <div class="container">
    <h1>To-Do List</h1>

    <div class="task-form">
      <input type="text" id="title" placeholder="Enter task title" />
      <textarea id="description" placeholder="Enter task description"></textarea>
      <button id="addTaskBtn">Add Task</button>
    </div>

    <div class="task-sections">
      <div class="task-box">
        <h2>Pending Tasks</h2>
        <div id="pendingTasks" class="task-list"></div>
      </div>

      <div class="task-box">
        <h2>Completed Tasks</h2>
        <div id="completedTasks" class="task-list"></div>
      </div>
    </div>
  </div>

  <script src="script.js"></script>
</body>
</html>
